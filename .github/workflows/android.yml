name: android-apk

# Builds the installable Android APK for the phone client and publishes it as a
# workflow artifact and a GitHub prerelease (stable download link).

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    name: build APK (arm64-v8a + armeabi-v7a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Rust toolchain (+ Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: android/rust

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build native libraries into jniLibs
        working-directory: android/rust
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -o ../app/src/main/jniLibs \
            build --release

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Assemble debug APK (installable, debug-signed)
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/llm-desk.apk
          ls -l dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-desk-apk
          path: dist/llm-desk.apk
          if-no-files-found: error

      - name: Publish prerelease with the APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: llm-desk-apk
          name: llm-desk Android APK (latest build)
          prerelease: true
          files: dist/llm-desk.apk
          body: |
            Latest debug-signed llm-desk phone client.
            Download `llm-desk.apk` on your Android phone and tap to install
            (you'll need to allow installing from your browser/files app).
